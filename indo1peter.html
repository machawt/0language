        .status { font-weight: bold; padding: 10px; margin: 10px 0; border-radius: 6px; }

</head>

<div class="box">

    <div id="screen1">

        <select id="phraseSelector" onchange="updatePreview()"></select>

        <div class="verse-text" id="previewBox">Loading phrases...</div>
        <button onclick="startPractice()">Start Practice</button>
    </div>

    <!-- SCREEN 2: GAMEPLAY -->
    <div id="screen2" class="hidden">
        <h2 id="phraseLabel">Practice Mode</h2>
        <p style="color: #7f8c8d; font-size: 14px;">Listen to the spoken audio, then type the Indonesian words:</p>
        
        <!-- AUDIO BUTTON -->
        <button class="btn-audio" onclick="playAudio()">

        </button>

        <div class="verse-text interactive-target" id="targetPhrase" onclick="peekIndonesian()"></div>
        
        <input type="text" id="userInput" placeholder="Type the Indonesian words you hear..." autocomplete="off" oninput="liveCheck()">
        
        <div id="result" class="status"></div>
        
        <div class="nav-controls">
            <button onclick="skipPhrase()" style="background:#f39c12;">Skip Phrase</button>
            <button onclick="goBack()" style="background:#95a5a6;">Change Phrase</button>
        </div>
    </div>

    let indonesianAnswer = "";
    let englishPrompt = "";
    let isTransitioning = false;
    let peekTimeout = null;

    // Populates the dropdown menu dynamically from the data array
    function buildDropdown() {
        const selector = document.getElementById("phraseSelector");
        selector.innerHTML = ""; // Clear existing
        
        bibleData.forEach((item, index) => {
            const opt = document.createElement("option");
            opt.value = item.ind;
            opt.setAttribute("data-english", item.eng);
            
            // Shorten the dropdown option label text so it fits beautifully on small screens
            let shortEng = item.eng.length > 35 ? item.eng.substring(0, 35) + "..." : item.eng;
            opt.text = `${item.id} - ${shortEng}`;
            selector.appendChild(opt);
        });
    }

    function updatePreview() {
        const selector = document.getElementById("phraseSelector");
        if(selector.options.length === 0) return;
        const selectedOption = selector.options[selector.selectedIndex];
        document.getElementById("previewBox").innerText = selectedOption.getAttribute("data-english");
    }

    function startPractice() {
        isTransitioning = false;
        clearTimeout(peekTimeout);
        
        const selector = document.getElementById("phraseSelector");
        const selectedOption = selector.options[selector.selectedIndex];
        
        indonesianAnswer = selectedOption.value;
        englishPrompt = selectedOption.getAttribute("data-english");
        
        const currentLabel = selectedOption.text.split(" - ")[0];
        document.getElementById("phraseLabel").innerText = currentLabel;
        
        const targetBox = document.getElementById("targetPhrase");
        targetBox.innerText = englishPrompt;
        targetBox.style.borderLeftColor = "#2980b9"; 
        
        document.getElementById("userInput").value = "";
        document.getElementById("userInput").disabled = false;
        document.getElementById("userInput").style.borderColor = "#ccc";
        document.getElementById("userInput").style.backgroundColor = "#fff";
        document.getElementById("result").innerText = "";
        
        document.getElementById("screen1").classList.add("hidden");
        document.getElementById("screen2").classList.remove("hidden");
        
        setTimeout(() => {
            document.getElementById("userInput").focus();
            playAudio();
        }, 300);
    }

    function peekIndonesian() {
        if (isTransitioning) return;
        clearTimeout(peekTimeout);
        
        const targetBox = document.getElementById("targetPhrase");
        targetBox.innerText = indonesianAnswer;
        targetBox.style.borderLeftColor = "#e67e22"; 
        
        peekTimeout = setTimeout(() => {
            targetBox.innerText = englishPrompt;
            targetBox.style.borderLeftColor = "#2980b9";
        }, 2000);
    }

    function playAudio() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            let spokenText = indonesianAnswer.replace(/-/g, " ");
            const utterance = new SpeechSynthesisUtterance(spokenText);
            utterance.lang = 'id-ID'; 
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        } else {
            alert("Your browser device does not support voice audio synthesis.");
        }
    }

    function liveCheck() {
        if (isTransitioning) return;

        const targetClean = indonesianAnswer.toLowerCase().replace(/[^a-z0-9]/g, "");
        const inputClean = document.getElementById("userInput").value.toLowerCase().replace(/[^a-z0-9]/g, "");
        const resultBox = document.getElementById("result");

        if (inputClean === targetClean && inputClean.length > 0) {
            isTransitioning = true;
            clearTimeout(peekTimeout); 
            
            document.getElementById("targetPhrase").innerText = englishPrompt;
            document.getElementById("targetPhrase").style.borderLeftColor = "#2980b9";

            resultBox.style.color = "green";
            resultBox.innerText = "✓ Perfect Match! Loading next phrase...";
            document.getElementById("userInput").style.borderColor = "#27ae60";
            document.getElementById("userInput").style.backgroundColor = "#e8f8f5";
            document.getElementById("userInput").disabled = true;

            setTimeout(() => {
                advanceToNext();
            }, 1500);

        } else if (targetClean.startsWith(inputClean) && inputClean.length > 0) {
            resultBox.style.color = "#3498db";
            resultBox.innerText = "Typing... (Spelling correct so far)";
            document.getElementById("userInput").style.borderColor = "#ccc";
            document.getElementById("userInput").style.backgroundColor = "#fff";
        } else if (inputClean.length > 0) {
            resultBox.style.color = "red";
            resultBox.innerText = "✗ Typo detected! Match the spoken Indonesian text.";
            document.getElementById("userInput").style.borderColor = "#e74c3c";
        } else {
            resultBox.innerText = "";
        }
    }

    function advanceToNext() {
        const selector = document.getElementById("phraseSelector");
        let nextIndex = selector.selectedIndex + 1;

        if (nextIndex >= selector.options.length) {
            nextIndex = 0;
        }

        selector.selectedIndex = nextIndex;
        updatePreview();
        startPractice();
    }

    function skipPhrase() {
        clearTimeout(peekTimeout);
        advanceToNext();
    }

    function goBack() {
        clearTimeout(peekTimeout);
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
        document.getElementById("screen2").classList.add("hidden");
        document.getElementById("screen1").classList.remove("hidden");
    }

    window.onload = function() {
        buildDropdown();
        updatePreview();
    };
</script>
